name: threadcraft
description: Thread Art Guide App - Turn Images Into Thread Masterpieces
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

  # Image
  image_picker: ^1.0.4
  image: ^4.1.3

  # Voice
  flutter_tts: ^3.8.5

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Export
  pdf: ^3.10.7
  screenshot: ^2.1.0
  share_plus: ^7.2.1

  # Permissions
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7


flutter:
  uses-material-design: true

  assets:
    - assets/images/


